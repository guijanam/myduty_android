<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DiaCalendar 관리자 대시보드</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; color: #333; }

        /* Login */
        .login-container { display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .login-box { background: #fff; padding: 40px; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.1); width: 360px; }
        .login-box h2 { margin-bottom: 24px; text-align: center; }
        .login-box input { width: 100%; padding: 12px; margin-bottom: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; }
        .login-box button { width: 100%; padding: 12px; background: #6750A4; color: #fff; border: none; border-radius: 8px; font-size: 14px; cursor: pointer; }
        .login-box button:hover { background: #7c68b5; }
        .login-error { color: #d32f2f; font-size: 13px; margin-top: 8px; text-align: center; }

        /* Layout */
        .app { display: none; }
        .header { background: #6750A4; color: #fff; padding: 16px 24px; display: flex; justify-content: space-between; align-items: center; }
        .header h1 { font-size: 20px; }
        .header button { background: rgba(255,255,255,0.2); color: #fff; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; }
        .nav { display: flex; background: #fff; border-bottom: 1px solid #e0e0e0; padding: 0 24px; }
        .nav button { padding: 14px 20px; border: none; background: none; cursor: pointer; font-size: 14px; color: #666; border-bottom: 3px solid transparent; }
        .nav button.active { color: #6750A4; border-bottom-color: #6750A4; font-weight: 600; }
        .content { padding: 24px; max-width: 1200px; margin: 0 auto; }

        /* Stats */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 24px; }
        .stat-card { background: #fff; padding: 20px; border-radius: 10px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
        .stat-card .label { font-size: 13px; color: #888; margin-bottom: 4px; }
        .stat-card .value { font-size: 28px; font-weight: 700; color: #6750A4; }

        /* Table */
        .card { background: #fff; border-radius: 10px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); margin-bottom: 20px; overflow: hidden; }
        .card-header { padding: 16px 20px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; }
        .card-header h3 { font-size: 16px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px 16px; text-align: left; border-bottom: 1px solid #f0f0f0; font-size: 13px; }
        th { background: #fafafa; font-weight: 600; color: #666; }
        tr:hover { background: #f9f7ff; }

        /* Buttons */
        .btn { padding: 6px 14px; border: none; border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: 500; }
        .btn-danger { background: #ffebee; color: #d32f2f; }
        .btn-danger:hover { background: #ffcdd2; }
        .btn-primary { background: #ede7f6; color: #6750A4; }
        .btn-primary:hover { background: #d1c4e9; }
        .btn-success { background: #e8f5e9; color: #2e7d32; }
        .btn-success:hover { background: #c8e6c9; }
        .btn-warn { background: #fff3e0; color: #e65100; }
        .btn-warn:hover { background: #ffe0b2; }

        /* Tab sections */
        .tab-section { display: none; }
        .tab-section.active { display: block; }

        /* Form */
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 6px; color: #555; }
        .form-group input, .form-group textarea, .form-group select { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; }
        .form-group textarea { min-height: 120px; resize: vertical; }

        /* Modal */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.4); z-index: 100; justify-content: center; align-items: center; }
        .modal-overlay.show { display: flex; }
        .modal { background: #fff; border-radius: 12px; padding: 24px; width: 480px; max-width: 90vw; max-height: 80vh; overflow-y: auto; }
        .modal h3 { margin-bottom: 16px; }
        .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px; }
        .modal-actions .btn { padding: 10px 20px; font-size: 14px; }

        .badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 600; }
        .badge-post { background: #e3f2fd; color: #1565c0; }
        .badge-comment { background: #f3e5f5; color: #7b1fa2; }
        .badge-active { background: #ffebee; color: #c62828; }
        .badge-expired { background: #e8f5e9; color: #2e7d32; }

        .empty { text-align: center; padding: 40px; color: #999; }
        .loading { text-align: center; padding: 20px; color: #999; }
    </style>
</head>
<body>

<!-- Login Screen -->
<div class="login-container" id="loginScreen">
    <div class="login-box">
        <h2>DiaCalendar Admin</h2>
        <input type="email" id="loginEmail" placeholder="관리자 이메일">
        <input type="password" id="loginPassword" placeholder="비밀번호">
        <button id="loginBtn">로그인</button>
        <div class="login-error" id="loginError"></div>
    </div>
</div>

<!-- App -->
<div class="app" id="app">
    <div class="header">
        <h1>DiaCalendar 관리자</h1>
        <button id="logoutBtn">로그아웃</button>
    </div>
    <div class="nav" id="navBar">
        <button class="active" data-tab="dashboard">대시보드</button>
        <button data-tab="reports">신고 관리</button>
        <button data-tab="bans">사용자 정지</button>
        <button data-tab="announcements">공지사항</button>
        <button data-tab="users">사용자 목록</button>
    </div>
    <div class="content">

        <!-- Dashboard Tab -->
        <div class="tab-section active" id="tab-dashboard">
            <div class="stats-grid" id="statsGrid">
                <div class="stat-card"><div class="label">전체 사용자</div><div class="value" id="stat-users">-</div></div>
                <div class="stat-card"><div class="label">전체 게시글</div><div class="value" id="stat-posts">-</div></div>
                <div class="stat-card"><div class="label">전체 댓글</div><div class="value" id="stat-comments">-</div></div>
                <div class="stat-card"><div class="label">미처리 신고</div><div class="value" id="stat-reports">-</div></div>
                <div class="stat-card"><div class="label">정지 사용자</div><div class="value" id="stat-banned">-</div></div>
                <div class="stat-card"><div class="label">오늘 게시글</div><div class="value" id="stat-today-posts">-</div></div>
                <div class="stat-card"><div class="label">오늘 댓글</div><div class="value" id="stat-today-comments">-</div></div>
            </div>
        </div>

        <!-- Reports Tab -->
        <div class="tab-section" id="tab-reports">
            <div class="card">
                <div class="card-header"><h3>신고 목록</h3></div>
                <table>
                    <thead><tr>
                        <th>ID</th><th>유형</th><th>대상 ID</th><th>사유</th><th>신고자</th><th>대상 작성자</th><th>일시</th><th>작업</th>
                    </tr></thead>
                    <tbody id="reportsBody"></tbody>
                </table>
            </div>
        </div>

        <!-- Bans Tab -->
        <div class="tab-section" id="tab-bans">
            <div class="card">
                <div class="card-header">
                    <h3>정지된 사용자</h3>
                    <button class="btn btn-primary" id="showBanBtn">+ 사용자 정지</button>
                </div>
                <table>
                    <thead><tr>
                        <th>닉네임</th><th>사유</th><th>정지 기간</th><th>상태</th><th>정지일</th><th>작업</th>
                    </tr></thead>
                    <tbody id="bansBody"></tbody>
                </table>
            </div>
        </div>

        <!-- Announcements Tab -->
        <div class="tab-section" id="tab-announcements">
            <div class="card">
                <div class="card-header">
                    <h3>공지사항</h3>
                    <button class="btn btn-primary" id="showAnnBtn">+ 공지 작성</button>
                </div>
                <table>
                    <thead><tr>
                        <th>ID</th><th>제목</th><th>고정</th><th>작성일</th><th>작업</th>
                    </tr></thead>
                    <tbody id="announcementsBody"></tbody>
                </table>
            </div>
        </div>

        <!-- Users Tab -->
        <div class="tab-section" id="tab-users">
            <div class="card">
                <div class="card-header">
                    <h3>사용자 목록</h3>
                    <input type="text" id="userSearch" placeholder="닉네임 검색..." style="padding:8px 12px; border:1px solid #ddd; border-radius:6px; width:200px;">
                </div>
                <table>
                    <thead><tr>
                        <th>UUID</th><th>닉네임</th><th>가입일</th><th>작업</th>
                    </tr></thead>
                    <tbody id="usersBody"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<!-- Ban Modal -->
<div class="modal-overlay" id="banModal">
    <div class="modal">
        <h3>사용자 정지</h3>
        <div class="form-group">
            <label>사용자 UUID</label>
            <input type="text" id="banUserId" placeholder="정지할 사용자 UUID">
        </div>
        <div class="form-group">
            <label>사유</label>
            <input type="text" id="banReason" placeholder="정지 사유">
        </div>
        <div class="form-group">
            <label>정지 기간</label>
            <select id="banDuration">
                <option value="">영구 정지</option>
                <option value="1">1일</option>
                <option value="3">3일</option>
                <option value="7">7일</option>
                <option value="14">14일</option>
                <option value="30">30일</option>
            </select>
        </div>
        <div class="modal-actions">
            <button class="btn btn-primary" id="banCancelBtn">취소</button>
            <button class="btn btn-danger" id="banSubmitBtn">정지</button>
        </div>
    </div>
</div>

<!-- Announcement Modal -->
<div class="modal-overlay" id="announcementModal">
    <div class="modal">
        <h3 id="announcementModalTitle">공지 작성</h3>
        <div class="form-group">
            <label>제목</label>
            <input type="text" id="annTitle" placeholder="공지 제목">
        </div>
        <div class="form-group">
            <label>내용</label>
            <textarea id="annContent" placeholder="공지 내용"></textarea>
        </div>
        <div class="form-group">
            <label><input type="checkbox" id="annPinned"> 상단 고정</label>
        </div>
        <input type="hidden" id="annEditId">
        <div class="modal-actions">
            <button class="btn btn-primary" id="annCancelBtn">취소</button>
            <button class="btn btn-success" id="annSaveBtn">저장</button>
        </div>
    </div>
</div>

<!-- Report Detail Modal -->
<div class="modal-overlay" id="reportDetailModal">
    <div class="modal">
        <h3>신고된 콘텐츠</h3>
        <div id="reportDetailContent" style="background:#f5f5f5; padding:16px; border-radius:8px; margin-bottom:16px; white-space:pre-wrap; max-height:300px; overflow-y:auto;"></div>
        <div class="modal-actions">
            <button class="btn btn-primary" id="reportCloseBtn">닫기</button>
            <button class="btn btn-danger" id="reportDeleteBtn">콘텐츠 삭제</button>
        </div>
    </div>
</div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

// ============================================
// Supabase 설정
// ============================================
const SUPABASE_URL = 'https://ljxvyrfepkaezpbjhcnp.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxqeHZ5cmZlcGthZXpwYmpoY25wIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzAxODM0OTcsImV4cCI6MjA4NTc1OTQ5N30.mY9Uvqf9l8LL_mJheUJ6XY734T7IHy4Kqcu4tvZiQyQ';

const db = createClient(SUPABASE_URL, SUPABASE_KEY);

let allUsers = [];

// ============================================
// Auth
// ============================================
async function login() {
    const email = document.getElementById('loginEmail').value;
    const password = document.getElementById('loginPassword').value;
    const errorEl = document.getElementById('loginError');
    errorEl.textContent = '';

    const { data, error } = await db.auth.signInWithPassword({ email, password });
    if (error) { errorEl.textContent = error.message; return; }

    const { data: admin } = await db.from('admins').select('id').eq('id', data.user.id).single();
    if (!admin) {
        errorEl.textContent = '관리자 권한이 없습니다.';
        await db.auth.signOut();
        return;
    }

    showApp();
}

async function logout() {
    await db.auth.signOut();
    document.getElementById('app').style.display = 'none';
    document.getElementById('loginScreen').style.display = 'flex';
}

async function checkSession() {
    const { data: { session } } = await db.auth.getSession();
    if (session) {
        const { data: admin } = await db.from('admins').select('id').eq('id', session.user.id).single();
        if (admin) { showApp(); return; }
    }
    document.getElementById('loginScreen').style.display = 'flex';
}

function showApp() {
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    loadDashboard();
}

// ============================================
// Tab Navigation
// ============================================
function switchTab(tabName, btn) {
    document.querySelectorAll('.tab-section').forEach(s => s.classList.remove('active'));
    document.querySelectorAll('.nav button').forEach(b => b.classList.remove('active'));
    document.getElementById('tab-' + tabName).classList.add('active');
    btn.classList.add('active');

    if (tabName === 'dashboard') loadDashboard();
    else if (tabName === 'reports') loadReports();
    else if (tabName === 'bans') loadBans();
    else if (tabName === 'announcements') loadAnnouncements();
    else if (tabName === 'users') loadUsers();
}

// ============================================
// Dashboard
// ============================================
async function loadDashboard() {
    const { data, error } = await db.rpc('get_admin_stats');
    if (error) { console.error(error); return; }
    document.getElementById('stat-users').textContent = data.total_users;
    document.getElementById('stat-posts').textContent = data.total_posts;
    document.getElementById('stat-comments').textContent = data.total_comments;
    document.getElementById('stat-reports').textContent = data.pending_reports;
    document.getElementById('stat-banned').textContent = data.banned_users;
    document.getElementById('stat-today-posts').textContent = data.today_posts;
    document.getElementById('stat-today-comments').textContent = data.today_comments;
}

// ============================================
// Reports
// ============================================
async function loadReports() {
    const tbody = document.getElementById('reportsBody');
    tbody.innerHTML = '<tr><td colspan="8" class="loading">로딩 중...</td></tr>';

    const { data: reports, error } = await db
        .from('reports')
        .select('*, reporter:reporter_id(nickname), target:target_author_id(nickname)')
        .order('created_at', { ascending: false });

    if (error) { tbody.innerHTML = '<tr><td colspan="8" class="empty">오류: ' + error.message + '</td></tr>'; return; }
    if (!reports.length) { tbody.innerHTML = '<tr><td colspan="8" class="empty">신고가 없습니다.</td></tr>'; return; }

    tbody.innerHTML = reports.map(r => `
        <tr>
            <td>${r.id}</td>
            <td><span class="badge badge-${r.content_type}">${r.content_type === 'post' ? '게시글' : '댓글'}</span></td>
            <td>${r.content_id}</td>
            <td>${escapeHtml(r.reason)}</td>
            <td>${r.reporter?.nickname || r.reporter_id.substring(0,8)}</td>
            <td>${r.target?.nickname || r.target_author_id.substring(0,8)}</td>
            <td>${formatDate(r.created_at)}</td>
            <td>
                <button class="btn btn-primary" data-action="view-report" data-type="${r.content_type}" data-id="${r.content_id}">보기</button>
                <button class="btn btn-danger" data-action="delete-report" data-type="${r.content_type}" data-content-id="${r.content_id}" data-report-id="${r.id}">삭제</button>
                <button class="btn btn-warn" data-action="ban-from-report" data-user-id="${r.target_author_id}">정지</button>
            </td>
        </tr>
    `).join('');
}

async function viewReportedContent(type, id) {
    const modal = document.getElementById('reportDetailModal');
    const contentEl = document.getElementById('reportDetailContent');
    const deleteBtn = document.getElementById('reportDeleteBtn');
    contentEl.textContent = '로딩 중...';
    modal.classList.add('show');

    if (type === 'post') {
        const { data } = await db.from('posts').select('title, content, profiles(nickname)').eq('id', id).single();
        if (data) {
            contentEl.innerHTML = `<strong>${escapeHtml(data.title)}</strong><br><small>작성자: ${data.profiles?.nickname || '알 수 없음'}</small><hr style="margin:8px 0">${escapeHtml(data.content)}`;
        } else {
            contentEl.textContent = '삭제되었거나 존재하지 않는 게시글입니다.';
        }
    } else {
        const { data } = await db.from('comments').select('content, is_deleted, profiles:author_id(nickname)').eq('id', id).single();
        if (data) {
            contentEl.innerHTML = `<small>작성자: ${data.profiles?.nickname || '알 수 없음'}</small><hr style="margin:8px 0">${data.is_deleted ? '<em>(삭제된 댓글)</em>' : escapeHtml(data.content)}`;
        } else {
            contentEl.textContent = '존재하지 않는 댓글입니다.';
        }
    }

    deleteBtn.onclick = () => { modal.classList.remove('show'); deleteReportedContent(type, id); };
}

async function deleteReportedContent(type, contentId, reportId) {
    if (!confirm('정말 삭제하시겠습니까?')) return;

    if (type === 'post') {
        await db.from('posts').delete().eq('id', contentId);
    } else {
        await db.from('comments').update({ is_deleted: true, content: '[관리자에 의해 삭제됨]' }).eq('id', contentId);
    }

    if (reportId) {
        await db.from('reports').delete().eq('id', reportId);
    }

    loadReports();
}

// ============================================
// Bans
// ============================================
async function loadBans() {
    const tbody = document.getElementById('bansBody');
    tbody.innerHTML = '<tr><td colspan="6" class="loading">로딩 중...</td></tr>';

    const { data: bans, error } = await db
        .from('banned_users')
        .select('*, profiles:user_id(nickname)')
        .order('created_at', { ascending: false });

    if (error) { tbody.innerHTML = '<tr><td colspan="6" class="empty">오류: ' + error.message + '</td></tr>'; return; }
    if (!bans.length) { tbody.innerHTML = '<tr><td colspan="6" class="empty">정지된 사용자가 없습니다.</td></tr>'; return; }

    tbody.innerHTML = bans.map(b => {
        const isActive = !b.banned_until || new Date(b.banned_until) > new Date();
        const period = b.banned_until ? formatDate(b.banned_until) + '까지' : '영구 정지';
        return `
        <tr>
            <td>${b.profiles?.nickname || b.user_id.substring(0,8)}</td>
            <td>${escapeHtml(b.reason)}</td>
            <td>${period}</td>
            <td><span class="badge ${isActive ? 'badge-active' : 'badge-expired'}">${isActive ? '정지 중' : '만료'}</span></td>
            <td>${formatDate(b.created_at)}</td>
            <td><button class="btn btn-success" data-action="unban" data-id="${b.id}">해제</button></td>
        </tr>`;
    }).join('');
}

function showBanModal(userId) {
    document.getElementById('banUserId').value = userId || '';
    document.getElementById('banReason').value = '';
    document.getElementById('banDuration').value = '';
    document.getElementById('banModal').classList.add('show');
}

async function banUser() {
    const userId = document.getElementById('banUserId').value.trim();
    const reason = document.getElementById('banReason').value.trim();
    const days = document.getElementById('banDuration').value;

    if (!userId) { alert('사용자 UUID를 입력하세요.'); return; }

    let bannedUntil = null;
    if (days) {
        const d = new Date();
        d.setDate(d.getDate() + parseInt(days));
        bannedUntil = d.toISOString();
    }

    const { error } = await db.from('banned_users').upsert({
        user_id: userId,
        reason: reason || '관리자에 의한 정지',
        banned_until: bannedUntil
    }, { onConflict: 'user_id' });

    if (error) { alert('오류: ' + error.message); return; }

    document.getElementById('banModal').classList.remove('show');
    loadBans();
}

async function unbanUser(id) {
    if (!confirm('정지를 해제하시겠습니까?')) return;
    await db.from('banned_users').delete().eq('id', id);
    loadBans();
}

// ============================================
// Announcements
// ============================================
async function loadAnnouncements() {
    const tbody = document.getElementById('announcementsBody');
    tbody.innerHTML = '<tr><td colspan="5" class="loading">로딩 중...</td></tr>';

    const { data, error } = await db
        .from('announcements')
        .select('*')
        .order('is_pinned', { ascending: false })
        .order('created_at', { ascending: false });

    if (error) { tbody.innerHTML = '<tr><td colspan="5" class="empty">오류: ' + error.message + '</td></tr>'; return; }
    if (!data.length) { tbody.innerHTML = '<tr><td colspan="5" class="empty">공지가 없습니다.</td></tr>'; return; }

    tbody.innerHTML = data.map(a => `
        <tr>
            <td>${a.id}</td>
            <td>${escapeHtml(a.title)}</td>
            <td>${a.is_pinned ? '고정' : '-'}</td>
            <td>${formatDate(a.created_at)}</td>
            <td>
                <button class="btn btn-primary" data-action="edit-ann" data-id="${a.id}">수정</button>
                <button class="btn btn-danger" data-action="delete-ann" data-id="${a.id}">삭제</button>
            </td>
        </tr>
    `).join('');
}

function showAnnouncementModal() {
    document.getElementById('announcementModalTitle').textContent = '공지 작성';
    document.getElementById('annTitle').value = '';
    document.getElementById('annContent').value = '';
    document.getElementById('annPinned').checked = false;
    document.getElementById('annEditId').value = '';
    document.getElementById('announcementModal').classList.add('show');
}

async function editAnnouncement(id) {
    const { data } = await db.from('announcements').select('*').eq('id', id).single();
    if (!data) return;
    document.getElementById('announcementModalTitle').textContent = '공지 수정';
    document.getElementById('annTitle').value = data.title;
    document.getElementById('annContent').value = data.content;
    document.getElementById('annPinned').checked = data.is_pinned;
    document.getElementById('annEditId').value = id;
    document.getElementById('announcementModal').classList.add('show');
}

async function saveAnnouncement() {
    const title = document.getElementById('annTitle').value.trim();
    const content = document.getElementById('annContent').value.trim();
    const isPinned = document.getElementById('annPinned').checked;
    const editId = document.getElementById('annEditId').value;

    if (!title || !content) { alert('제목과 내용을 입력하세요.'); return; }

    const { data: { session } } = await db.auth.getSession();

    if (editId) {
        const { error } = await db.from('announcements').update({ title, content, is_pinned: isPinned }).eq('id', editId);
        if (error) { alert('오류: ' + error.message); return; }
    } else {
        const { error } = await db.from('announcements').insert({ title, content, is_pinned: isPinned, author_id: session.user.id });
        if (error) { alert('오류: ' + error.message); return; }
    }

    document.getElementById('announcementModal').classList.remove('show');
    loadAnnouncements();
}

async function deleteAnnouncement(id) {
    if (!confirm('공지를 삭제하시겠습니까?')) return;
    await db.from('announcements').delete().eq('id', id);
    loadAnnouncements();
}

// ============================================
// Users
// ============================================
async function loadUsers() {
    const tbody = document.getElementById('usersBody');
    tbody.innerHTML = '<tr><td colspan="4" class="loading">로딩 중...</td></tr>';

    const { data, error } = await db.from('profiles').select('*').order('updated_at', { ascending: false });
    if (error) { tbody.innerHTML = '<tr><td colspan="4" class="empty">오류: ' + error.message + '</td></tr>'; return; }

    allUsers = data || [];
    renderUsers(allUsers);
}

function searchUsers() {
    const q = document.getElementById('userSearch').value.toLowerCase();
    const filtered = q ? allUsers.filter(u => u.nickname.toLowerCase().includes(q)) : allUsers;
    renderUsers(filtered);
}

function renderUsers(users) {
    const tbody = document.getElementById('usersBody');
    if (!users.length) { tbody.innerHTML = '<tr><td colspan="4" class="empty">사용자가 없습니다.</td></tr>'; return; }
    tbody.innerHTML = users.map(u => `
        <tr>
            <td style="font-size:11px; font-family:monospace;">${u.id.substring(0,12)}...</td>
            <td>${escapeHtml(u.nickname)}</td>
            <td>${formatDate(u.updated_at)}</td>
            <td>
                <button class="btn btn-warn" data-action="ban-user" data-user-id="${u.id}">정지</button>
            </td>
        </tr>
    `).join('');
}

// ============================================
// Helpers
// ============================================
function formatDate(str) {
    if (!str) return '-';
    const d = new Date(str);
    return d.toLocaleDateString('ko-KR') + ' ' + d.toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' });
}

function escapeHtml(text) {
    if (!text) return '';
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

// ============================================
// Event Listeners (이벤트 위임)
// ============================================
document.getElementById('loginBtn').addEventListener('click', login);
document.getElementById('logoutBtn').addEventListener('click', logout);
document.getElementById('showBanBtn').addEventListener('click', () => showBanModal());
document.getElementById('banCancelBtn').addEventListener('click', () => document.getElementById('banModal').classList.remove('show'));
document.getElementById('banSubmitBtn').addEventListener('click', banUser);
document.getElementById('showAnnBtn').addEventListener('click', showAnnouncementModal);
document.getElementById('annCancelBtn').addEventListener('click', () => document.getElementById('announcementModal').classList.remove('show'));
document.getElementById('annSaveBtn').addEventListener('click', saveAnnouncement);
document.getElementById('reportCloseBtn').addEventListener('click', () => document.getElementById('reportDetailModal').classList.remove('show'));
document.getElementById('userSearch').addEventListener('input', searchUsers);

// 네비게이션 탭
document.getElementById('navBar').addEventListener('click', (e) => {
    const btn = e.target.closest('button[data-tab]');
    if (btn) switchTab(btn.dataset.tab, btn);
});

// 테이블 내 버튼 이벤트 위임
document.addEventListener('click', (e) => {
    const btn = e.target.closest('[data-action]');
    if (!btn) return;

    const action = btn.dataset.action;
    if (action === 'view-report') viewReportedContent(btn.dataset.type, btn.dataset.id);
    else if (action === 'delete-report') deleteReportedContent(btn.dataset.type, btn.dataset.contentId, btn.dataset.reportId);
    else if (action === 'ban-from-report') showBanModal(btn.dataset.userId);
    else if (action === 'unban') unbanUser(btn.dataset.id);
    else if (action === 'edit-ann') editAnnouncement(btn.dataset.id);
    else if (action === 'delete-ann') deleteAnnouncement(btn.dataset.id);
    else if (action === 'ban-user') showBanModal(btn.dataset.userId);
});

// Enter 키 로그인
document.getElementById('loginPassword').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') login();
});

// Init
checkSession();
</script>
</body>
</html>
